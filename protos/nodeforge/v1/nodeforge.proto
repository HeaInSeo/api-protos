syntax = "proto3";

package nodeforge.v1;

option go_package = "github.com/HeaInSeo/api-protos/gen/go/nodeforge/v1;nodeforgesv1";

// ─────────────────────────────────────────────────────────────────────────────
// 공통 스펙 메시지 (RegisteredTool v0.2)
// ─────────────────────────────────────────────────────────────────────────────

// PortSpec: 툴의 단일 입력 또는 출력 포트 계약.
// inputs에서는 required가 유효. outputs에서는 class가 유효.
message PortSpec {
  string name   = 1;  // 포트 이름 (예: "reads", "aligned_bam")
  string role   = 2;  // 의미적 역할 (예: "sample-fastq", "aligned-bam")
  string format = 3;  // 데이터 형식 (예: "fastq", "bam", "text")
  string shape  = 4;  // "single" | "pair"
  bool   required = 5; // input 전용
  string class  = 6;  // output 전용: "primary" | "secondary"
  map<string, string> constraints = 7; // output 전용: 예) sorted=coordinate
}

// DisplaySpec: 사용자 UI 팔레트 표시용 메타데이터.
// stableRef(UI 검색)와 함께 쓰임. 파이프라인 pin 기준은 casHash.
message DisplaySpec {
  string label       = 1;  // UI 카드 제목 (예: "BWA-MEM 0.7.17")
  string description = 2;  // 툴팁 설명
  string category    = 3;  // 그룹핑 카테고리 (예: "Alignment")
  repeated string tags = 4; // 검색 태그
}

// ValidationStatus: L3/L4 검증 결과 상태.
message ValidationStatus {
  string phase             = 1;  // "Pending" | "Running" | "Passed" | "Failed"
  int64  last_validated_at = 2;  // Unix timestamp
  repeated string failures = 3;  // phase=Failed일 때 실패 사유 목록
}

// ─────────────────────────────────────────────────────────────────────────────
// PolicyService — DockGuard 정책 번들 관리
// ─────────────────────────────────────────────────────────────────────────────

service PolicyService {
  // 최신 DockGuard 정책 번들(.wasm)을 반환한다.
  rpc GetPolicyBundle(GetPolicyBundleRequest) returns (PolicyBundle);

  // 현재 등록된 정책 목록과 버전을 반환한다.
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
}

message GetPolicyBundleRequest {}

message PolicyBundle {
  // opa build로 생성된 .wasm 바이트.
  bytes  wasm_bytes = 1;
  string version    = 2;
  int64  built_at   = 3; // Unix timestamp
}

message ListPoliciesRequest {}

message PolicyInfo {
  string rule_id    = 1;
  string name       = 2;
  string version    = 3;
  string description = 4;
}

message ListPoliciesResponse {
  repeated PolicyInfo policies = 1;
  string bundle_version        = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// BuildService — builder Job orchestration
// ─────────────────────────────────────────────────────────────────────────────

service BuildService {
  // BuildRequest를 수신하고 빌드 이벤트 스트림을 반환한다.
  rpc BuildAndRegister(BuildRequest) returns (stream BuildEvent);
}

message BuildRequest {
  string request_id         = 1;
  string tool_definition_id = 2;
  string tool_name          = 3;

  // 베이스 이미지 URI (digest 포함)
  string image_uri          = 4;

  // Dockerfile 내용
  string dockerfile_content = 5;

  // 실행 스크립트
  string script             = 6;

  // 환경 스펙 파일 내용 (conda environment.yml, requirements.txt 등)
  string environment_spec   = 9;

  // v0.2 추가 필드 ──────────────────────────────────────────────────────────
  string version            = 10; // 툴 버전 (예: "0.7.17"). stable_ref = tool_name@version.
  repeated PortSpec inputs  = 12; // 포트 계약 (역할, 형식, shape 포함)
  repeated PortSpec outputs = 13;
  DisplaySpec display       = 14; // UI 팔레트 표시 메타데이터
  string command            = 15; // 컨테이너 진입점 (선택; 없으면 Dockerfile ENTRYPOINT 사용)

  // 필드 번호 7, 8은 예약됨 (이전 input_names, output_names — 재사용 금지)
  reserved 7, 8;
  reserved "input_names", "output_names";
}

enum BuildEventKind {
  BUILD_EVENT_KIND_UNSPECIFIED     = 0;
  BUILD_EVENT_KIND_LOG             = 1;
  BUILD_EVENT_KIND_JOB_CREATED    = 2;
  BUILD_EVENT_KIND_JOB_RUNNING    = 3;
  BUILD_EVENT_KIND_PUSH_SUCCEEDED = 4;
  BUILD_EVENT_KIND_DIGEST_ACQUIRED = 5;
  BUILD_EVENT_KIND_SUCCEEDED      = 6;
  BUILD_EVENT_KIND_FAILED         = 7;
}

message BuildEvent {
  BuildEventKind kind = 1;
  string message      = 2;
  int64  timestamp    = 3;
  // digest: BUILD_EVENT_KIND_DIGEST_ACQUIRED 시 채워짐
  string digest       = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// ValidateService — L3 dry-run + L4 smoke run
// ─────────────────────────────────────────────────────────────────────────────

service ValidateService {
  // L3: kind server-side dry-run
  rpc DryRun(DryRunRequest) returns (DryRunResult);

  // L4: 최소 happy-path smoke run
  rpc SmokeRun(SmokeRunRequest) returns (SmokeRunResult);
}

message DryRunRequest {
  string request_id    = 1;
  string manifest_yaml = 2;
}

message DryRunResult {
  bool   success       = 1;
  string error_message = 2;
}

message SmokeRunRequest {
  string request_id    = 1;
  string manifest_yaml = 2;
}

message SmokeRunResult {
  bool   success       = 1;
  int32  exit_code     = 2;
  string log_output    = 3;
  string error_message = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// ToolRegistryService — RegisteredToolDefinition 관리
// ─────────────────────────────────────────────────────────────────────────────

service ToolRegistryService {
  // 툴을 등록하고 RegisteredToolDefinition을 확정한다.
  rpc RegisterTool(RegisterToolRequest) returns (RegisterToolResponse);

  // 등록된 툴 단건 조회.
  rpc GetTool(GetToolRequest) returns (RegisteredToolDefinition);

  // 등록된 툴 목록 조회.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
}

message RegisterToolRequest {
  string request_id         = 1;
  string tool_definition_id = 2;
  string tool_name          = 3;
  string image_uri          = 4;
  string digest             = 5;
  string environment_spec   = 8;

  // v0.2 추가 필드 ──────────────────────────────────────────────────────────
  string version            = 9;  // 툴 버전
  string stable_ref         = 10; // NodeForge가 tool_name@version으로 조립해 저장
  repeated PortSpec inputs  = 11;
  repeated PortSpec outputs = 12;
  DisplaySpec display       = 13;
  string command            = 14;

  // 필드 번호 6, 7은 예약됨 (이전 input_names, output_names — 재사용 금지)
  reserved 6, 7;
  reserved "input_names", "output_names";
}

message RegisterToolResponse {
  string cas_hash = 1; // SHA256 hash — CAS 파일명
  RegisteredToolDefinition tool = 2;
}

message GetToolRequest {
  string cas_hash = 1;
}

message ListToolsRequest {
  // stableRef 기준 필터. 비어 있으면 전체 반환.
  string stable_ref = 1;
}

message ListToolsResponse {
  repeated RegisteredToolDefinition tools = 1;
}

message RegisteredToolDefinition {
  string cas_hash           = 1;  // SHA256(spec JSON) — 파이프라인 toolRef의 고정 기준
  string tool_definition_id = 2;
  string tool_name          = 3;
  string image_uri          = 4;
  string digest             = 5;  // 이미지 레이어 digest
  int64  registered_at      = 8;
  string environment_spec   = 9;

  // v0.2 추가 필드 ──────────────────────────────────────────────────────────
  string version            = 10; // 툴 버전 (예: "0.7.17")
  string stable_ref         = 11; // UI/검색 전용 (tool_name@version). 파이프라인 pin 금지.
  repeated PortSpec inputs  = 12;
  repeated PortSpec outputs = 13;
  DisplaySpec display       = 14;

  // 상태 이중 축 — 절대 같은 필드에 섞지 않는다.
  // lifecycle_phase: NodeVault 명시적 호출만 변경 (운영 의도)
  string lifecycle_phase    = 15; // "Pending" | "Active" | "Retracted" | "Deleted"
  ValidationStatus validation = 16;
  string command            = 17;
  // integrity_health: reconcile loop만 변경 (Harbor 정합성 관찰 결과)
  string integrity_health   = 18; // "Healthy" | "Partial" | "Missing" | "Unreachable" | "Orphaned"

  // 필드 번호 6, 7은 예약됨 (이전 input_names, output_names — 재사용 금지)
  reserved 6, 7;
  reserved "input_names", "output_names";
}

// ─────────────────────────────────────────────────────────────────────────────
// PingService — Phase 0 연결 확인용 (ping/pong)
// ─────────────────────────────────────────────────────────────────────────────

service PingService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message    = 1;
  string server_id  = 2;
}
